<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wang Mandarin - Dwibahasa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        .tab-active {
            color: #ea580c;
            border-bottom: 4px solid #ea580c;
            font-weight: 800;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-slate-900 pb-20">

    <!-- Header & Language Switcher -->
    <header class="bg-orange-600 text-white p-6 shadow-lg sticky top-0 z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black tracking-tight" id="header-title">Jom Belajar Wang</h1>
                <p class="text-orange-100 text-[10px] font-semibold uppercase tracking-wider" id="header-sub">Kuài, Máo & Fēn</p>
            </div>
            <div class="flex bg-orange-700 p-1 rounded-xl">
                <button onclick="setLanguage('ms')" id="lang-ms" class="px-3 py-1 rounded-lg text-xs font-bold transition-all bg-white text-orange-700">BM</button>
                <button onclick="setLanguage('en')" id="lang-en" class="px-3 py-1 rounded-lg text-xs font-bold transition-all">EN</button>
            </div>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="bg-white border-b shadow-sm sticky top-[84px] z-40">
        <div class="max-w-xl mx-auto flex">
            <button onclick="switchTab('learn')" id="tab-btn-learn" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400 tab-active">Belajar / Learn</button>
            <button onclick="switchTab('calc')" id="tab-btn-calc" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400">Kalkulator / Calc</button>
            <button onclick="switchTab('game')" id="tab-btn-game" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400">Main / Play</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-xl mx-auto p-5">
        
        <!-- Tab: Belajar -->
        <section id="tab-learn" class="space-y-6 fade-in">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-orange-800 font-extrabold text-lg mb-4" id="learn-title">Unit Sebutan Tunggal</h2>
                <div class="space-y-4">
                    <!-- Unit Kuai -->
                    <div class="p-4 bg-orange-50 rounded-2xl border border-orange-100 flex justify-between items-center">
                        <div>
                            <div class="flex items-baseline gap-2">
                                <span class="text-4xl font-black text-orange-900">块</span>
                                <span class="text-lg font-bold text-orange-600 font-mono italic">kuài</span>
                            </div>
                            <p class="text-[10px] text-orange-400 font-bold uppercase mt-1" data-key="unit-ringgit">Unit: RINGGIT</p>
                        </div>
                        <button onclick="speakSingleUnit('块')" class="p-3 bg-white rounded-2xl shadow-md text-orange-600 active:scale-90 transition-transform flex flex-col items-center">
                            <span class="text-[10px] font-black mb-1" data-key="listen">DENGAR</span>
                            <span class="text-xl">🔊</span>
                        </button>
                    </div>
                    <!-- Unit Mao -->
                    <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100 flex justify-between items-center">
                        <div>
                            <div class="flex items-baseline gap-2">
                                <span class="text-4xl font-black text-blue-900">毛</span>
                                <span class="text-lg font-bold text-blue-600 font-mono italic">máo</span>
                            </div>
                            <p class="text-[10px] text-blue-400 font-bold uppercase mt-1" data-key="unit-10sen">Unit: 10 SEN</p>
                        </div>
                        <button onclick="speakSingleUnit('毛')" class="p-3 bg-white rounded-2xl shadow-md text-blue-600 active:scale-90 transition-transform flex flex-col items-center">
                            <span class="text-[10px] font-black mb-1" data-key="listen">DENGAR</span>
                            <span class="text-xl">🔊</span>
                        </button>
                    </div>
                    <!-- Unit Fen -->
                    <div class="p-4 bg-emerald-50 rounded-2xl border border-emerald-100 flex justify-between items-center">
                        <div>
                            <div class="flex items-baseline gap-2">
                                <span class="text-4xl font-black text-emerald-900">分</span>
                                <span class="text-lg font-bold text-emerald-600 font-mono italic">fēn</span>
                            </div>
                            <p class="text-[10px] text-emerald-400 font-bold uppercase mt-1" data-key="unit-1sen">Unit: 1 SEN</p>
                        </div>
                        <button onclick="speakSingleUnit('分')" class="p-3 bg-white rounded-2xl shadow-md text-emerald-600 active:scale-90 transition-transform flex flex-col items-center">
                            <span class="text-[10px] font-black mb-1" data-key="listen">DENGAR</span>
                            <span class="text-xl">🔊</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Tab: Kalkulator -->
        <section id="tab-calc" class="hidden space-y-6 fade-in">
            <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                <h2 class="text-slate-400 text-xs font-black uppercase tracking-widest mb-6 text-center" id="calc-instruction">Masukkan Nilai Wang</h2>
                <div class="flex gap-3 mb-8">
                    <div class="flex-1 relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-xs">RM</span>
                        <input type="number" id="input-rm" placeholder="0" class="w-full text-2xl font-black p-4 pl-10 border-2 rounded-2xl focus:border-orange-500 outline-none text-right bg-slate-50">
                    </div>
                    <div class="flex-1 relative">
                        <input type="number" id="input-sen" placeholder="0" class="w-full text-2xl font-black p-4 pr-12 border-2 rounded-2xl focus:border-orange-500 outline-none bg-slate-50">
                        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-xs">SEN</span>
                    </div>
                </div>
                <button onclick="calculate()" class="w-full bg-orange-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-orange-200 active:scale-95 transition-all flex items-center justify-center gap-2" id="calc-btn">
                    🔊 TERJEMAH & SEBUT
                </button>

                <div id="result-area" class="mt-8 hidden animate-in zoom-in">
                    <div class="p-8 bg-orange-50 rounded-3xl border-2 border-orange-100 text-center">
                        <div id="res-zh" class="text-3xl font-black text-orange-900 mb-2"></div>
                        <div id="res-py" class="text-orange-600 font-mono text-sm tracking-widest uppercase"></div>
                        <div id="res-ml" class="mt-4 text-[10px] font-bold text-slate-300 border-t pt-4"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Tab: Permainan -->
        <section id="tab-game" class="hidden space-y-6 fade-in">
            <div class="flex justify-between items-center">
                <div class="bg-orange-600 text-white px-6 py-2 rounded-full font-black shadow-lg"><span id="score-label">SKOR</span>: <span id="game-score">0</span></div>
                <button onclick="togglePinyin()" id="pinyin-toggle" class="text-[10px] font-black bg-white border-2 px-3 py-2 rounded-xl text-slate-500">LIHAT PINYIN</button>
            </div>
            
            <div class="bg-white p-10 rounded-[40px] shadow-xl text-center border-b-8 border-orange-500">
                <p class="text-slate-400 text-[10px] font-black uppercase mb-2 tracking-widest" id="game-mission">Berapakah harga ini?</p>
                <h3 id="item-name" class="text-2xl font-black text-slate-800 mb-2">Item</h3>
                <div id="item-price" class="text-4xl font-black text-orange-600 bg-orange-50 px-8 py-3 rounded-2xl inline-block">RM 0.00</div>
            </div>

            <div id="game-options" class="grid grid-cols-1 gap-3"></div>
            <div id="game-feedback" class="text-center font-black h-6"></div>
        </section>

    </main>

    <script>
        let currentLang = 'ms';
        let score = 0;
        let showPinyin = false;
        let currentPrice = 0;

        const langData = {
            ms: {
                title: "Jom Belajar Wang",
                sub: "Unit Lisan: Kuài, Máo & Fēn",
                tabLearn: "Belajar",
                tabCalc: "Kalkulator",
                tabGame: "Permainan",
                learnTitle: "Sebutan Unit Tunggal",
                unitRinggit: "Unit: RINGGIT",
                unit10Sen: "Unit: 10 SEN",
                unit1Sen: "Unit: 1 SEN",
                listen: "DENGAR",
                calcInstr: "Masukkan Nilai Wang",
                calcBtn: "🔊 TERJEMAH & SEBUT",
                score: "SKOR",
                showPy: "LIHAT PINYIN",
                hidePy: "SOROK PINYIN",
                mission: "Berapakah harga ini?",
                correct: "BETUL!",
                wrong: "CUBA LAGI",
                items: ["Nasi Lemak", "Teh Tarik", "Basikal", "Buku", "Ais Krim", "Kasut"]
            },
            en: {
                title: "Learn Money",
                sub: "Speaking Units: Kuài, Máo & Fēn",
                tabLearn: "Learn",
                tabCalc: "Calculator",
                tabGame: "Game",
                learnTitle: "Single Unit Pronunciation",
                unitRinggit: "Unit: RINGGIT",
                unit10Sen: "Unit: 10 SEN",
                unit1Sen: "Unit: 1 SEN",
                listen: "LISTEN",
                calcInstr: "Enter Money Value",
                calcBtn: "🔊 TRANSLATE & SPEAK",
                score: "SCORE",
                showPy: "SHOW PINYIN",
                hidePy: "HIDE PINYIN",
                mission: "How much is this?",
                correct: "CORRECT!",
                wrong: "TRY AGAIN",
                items: ["Fried Rice", "Milk Tea", "Bicycle", "Book", "Ice Cream", "Shoes"]
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            const d = langData[lang];
            
            // UI Updates
            document.getElementById('header-title').innerText = d.title;
            document.getElementById('header-sub').innerText = d.sub;
            document.getElementById('tab-btn-learn').innerText = d.tabLearn;
            document.getElementById('tab-btn-calc').innerText = d.tabCalc;
            document.getElementById('tab-btn-game').innerText = d.tabGame;
            document.getElementById('learn-title').innerText = d.learnTitle;
            document.getElementById('calc-instruction').innerText = d.calcInstr;
            document.getElementById('calc-btn').innerText = d.calcBtn;
            document.getElementById('score-label').innerText = d.score;
            document.getElementById('game-mission').innerText = d.mission;
            document.getElementById('pinyin-toggle').innerText = showPinyin ? d.hidePy : d.showPy;

            // Update specific labels
            document.querySelectorAll('[data-key="unit-ringgit"]').forEach(el => el.innerText = d.unitRinggit);
            document.querySelectorAll('[data-key="unit-10sen"]').forEach(el => el.innerText = d.unit10Sen);
            document.querySelectorAll('[data-key="unit-1sen"]').forEach(el => el.innerText = d.unit1Sen);
            document.querySelectorAll('[data-key="listen"]').forEach(el => el.innerText = d.listen);

            // Button Styles
            document.getElementById('lang-ms').className = `px-3 py-1 rounded-lg text-xs font-bold transition-all ${lang === 'ms' ? 'bg-white text-orange-700' : ''}`;
            document.getElementById('lang-en').className = `px-3 py-1 rounded-lg text-xs font-bold transition-all ${lang === 'en' ? 'bg-white text-orange-700' : ''}`;

            if (document.getElementById('tab-game').className.indexOf('hidden') === -1) initGame();
        }

        const zhDigits = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
        const pyDigits = ['líng', 'yī', 'èr', 'sān', 'sì', 'wǔ', 'liù', 'qī', 'bā', 'jiǔ'];

        function switchTab(tab) {
            document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-btn-' + tab).classList.add('tab-active');
            if (tab === 'game') initGame();
        }

        function speakSingleUnit(char) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = char; 
            msg.lang = 'zh-CN';
            msg.rate = 0.6;
            window.speechSynthesis.speak(msg);
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'zh-CN';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function numberToChinese(num) {
            if (num === 0) return { zh: '零', py: 'líng' };
            if (num === 2) return { zh: '两', py: 'liǎng' }; 
            let zh = ""; let py = "";
            const hundreds = Math.floor(num / 100);
            const tens = Math.floor((num % 100) / 10);
            const ones = num % 10;
            if (hundreds > 0) {
                zh += zhDigits[hundreds] + "百";
                py += pyDigits[hundreds] + " bǎi";
            }
            if (tens > 0) {
                if (hundreds > 0 || (tens > 1)) {
                    zh += (tens === 2 ? '二' : zhDigits[tens]);
                    py += " " + (tens === 2 ? 'èr' : pyDigits[tens]);
                }
                zh += "十"; py += " shí";
            } else if (hundreds > 0 && ones > 0) {
                zh += "零"; py += " líng";
            }
            if (ones > 0) {
                zh += zhDigits[ones]; py += " " + pyDigits[ones];
            }
            return { zh: zh.trim(), py: py.trim() };
        }

        function convertMoney(rm, sen) {
            let zh = ""; let py = "";
            const rmVal = Math.abs(parseInt(rm) || 0);
            const senVal = Math.abs(parseInt(sen) || 0);
            if (rmVal > 0) {
                const res = numberToChinese(rmVal);
                zh += res.zh + "块";
                py += res.py + " kuài";
            }
            if (senVal > 0) {
                const maos = Math.floor(senVal / 10);
                const fens = senVal % 10;
                if (zh) { zh += " "; py += " "; }
                if (maos > 0) {
                    const m = numberToChinese(maos);
                    zh += m.zh + "毛"; py += m.py + " máo";
                } else if (rmVal > 0 && fens > 0) {
                    zh += "零"; py += " líng";
                }
                if (fens > 0) {
                    const f = numberToChinese(fens);
                    zh += f.zh + "分";
                    py += (py.endsWith(" ") ? "" : " ") + f.py + " fēn";
                }
            }
            if (rmVal === 0 && senVal === 0) return { zh: "零块", py: "líng kuài" };
            return { zh: zh.trim(), py: py.trim() };
        }

        function calculate() {
            const rm = document.getElementById('input-rm').value;
            const sen = document.getElementById('input-sen').value;
            const result = convertMoney(rm, sen);
            document.getElementById('res-zh').innerText = result.zh;
            document.getElementById('res-py').innerText = result.py;
            document.getElementById('res-ml').innerText = `RM ${rm || 0}.${sen || 0}`;
            document.getElementById('result-area').classList.remove('hidden');
            speak(result.zh);
        }

        function initGame() {
            const items = langData[currentLang].items;
            const name = items[Math.floor(Math.random() * items.length)];
            const p = (Math.random() * 20 + 1).toFixed(2);
            currentPrice = parseFloat(p);
            
            document.getElementById('item-name').innerText = name;
            document.getElementById('item-price').innerText = "RM " + p;
            document.getElementById('game-feedback').innerText = "";

            const correct = convertMoney(Math.floor(p), Math.round((p % 1) * 100));
            let options = [{ ...correct, correct: true }];
            while (options.length < 3) {
                const randRM = Math.floor(Math.random() * 30) + 1;
                const randSen = Math.floor(Math.random() * 10) * 10;
                const opt = convertMoney(randRM, randSen);
                if (!options.find(o => o.zh === opt.zh)) options.push({ ...opt, correct: false });
            }
            options.sort(() => Math.random() - 0.5);
            const container = document.getElementById('game-options');
            container.innerHTML = "";
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "bg-white p-5 rounded-2xl border-2 border-slate-100 shadow-sm text-lg font-black text-slate-700 active:scale-95 transition-all text-left flex flex-col justify-center min-h-[90px]";
                btn.innerHTML = `<div>${opt.zh}</div><div class="pinyin-text text-[10px] text-orange-400 font-mono mt-1 ${showPinyin ? '' : 'hidden'}">${opt.py}</div>`;
                btn.onclick = () => {
                    if (opt.correct) {
                        score += 10; document.getElementById('game-score').innerText = score;
                        document.getElementById('game-feedback').innerText = "✅ " + langData[currentLang].correct;
                        speak(opt.zh); setTimeout(initGame, 1500);
                    } else {
                        document.getElementById('game-feedback').innerText = "❌ " + langData[currentLang].wrong;
                        btn.classList.add('border-red-500');
                    }
                };
                container.appendChild(btn);
            });
        }

        function togglePinyin() {
            showPinyin = !showPinyin;
            document.getElementById('pinyin-toggle').innerText = showPinyin ? langData[currentLang].hidePy : langData[currentLang].showPy;
            document.querySelectorAll('.pinyin-text').forEach(el => el.classList.toggle('hidden'));
        }

        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
